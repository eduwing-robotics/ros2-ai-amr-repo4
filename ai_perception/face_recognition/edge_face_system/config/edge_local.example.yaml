cctv:
  camera: auto
  camera_index: auto
  droidcam:
    enabled: true
    mode: usb
    video_device: auto
    wifi_ip: 192.168.0.10
    wifi_port: 4747
    adb_port: 4747
    adb_serial: __auto__
    size: 640x480
  topic: /globalcam/image_raw/compressed
  frame_id: globalcam
  server_url: ''
  camera_id: globalcam-001
  images_path: /api/v1/cctv/images
  interval_sec: 3.0
  width: 640
  height: 480
  fps: 10
  camera_fps: 10
  jpeg_quality: 80
  topic_jpeg_quality: 75
  timeout_sec: 3.0
  frame_read_retries: 10
  frame_retry_sleep: 0.05
  last_image_path: /tmp/globalcam_cctv_latest.jpg
  local_log_path: data/cctv_sender_events.jsonl
  dry_run: false
  viewer_enabled: true
  viewer_window_name: GlobalCam-CCTV
  viewer_max_width: 960
face_viewer:
  enabled: false
  window_name: Face-Recognition
  max_width: 960

barrier:
  enabled: true
  mac: 90:15:06:E4:30:7A
  status_handle: '0x002a'
  open_handle: '0x0030'
  close_handle: '0x0032'
  trigger_payload: '2441414141'
  auto_close_seconds: 3.0
admin:
