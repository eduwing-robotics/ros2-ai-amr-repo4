device:
  id: edge-dev-001
ros:
  image_topic: /camera/camera/color/image_raw
  depth_topic: /camera/camera/aligned_depth_to_color/image_raw
  state_topic: /face/recognition_state
  annotated_topic: /face/annotated_image
realsense:
  color_profile: 424x240x15
  depth_profile: 480x270x15
  publish_topics: true
perception:
  input_mode: ros
  det_size: 320
  onnx_threads: 1
  emit_interval: 0.1
  process_fps: 3.0
  person_detector: none
  crop_width_ratio: 0.75
  crop_height_ratio: 1.0
ui:
  host: 127.0.0.1
  port: 8090
  snapshot_path: /tmp/robot_face_annotated.jpg
  snapshot_fps: 15
  snapshot_quality: 82
server:
  enabled: true
  url: http://127.0.0.1:8000
  token: 
  
  employees_face_registry_path: /api/v1/employees/face-registry
  employee_state_path: /api/v1/employees/{employee_number}/attendance-state
  attendance_records_path: /api/v1/attendance/records
  face_registration_path: /api/v1/employees/face-registration
  visitors_qr_registry_path: /api/v1/visitors/qr-registry
